# Server Configuration
server.port=8080

server.servlet.context-path=/neoulteo
server.servlet.session.cookie.path=/
spring.config.import=optional:classpath:application-local.properties
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=jdbc:mysql://localhost:3306/ssafy_trip?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=ssafy
spring.datasource.password=ssafy
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

mybatis.mapper-locations=classpath:/mappers/*.xml
mybatis.type-aliases-package=com.neoulteo.domain.user.dto,com.neoulteo.domain.hotplace.dto,com.neoulteo.domain.travelplan.dto,com.neoulteo.batch.dto,com.neoulteo.domain.post.dto,com.neoulteo.domain.savedplace.dto
mybatis.configuration.map-underscore-to-camel-case=true

community.admin-emails=${COMMUNITY_ADMIN_EMAILS:a@a}
community.upload-dir=${COMMUNITY_UPLOAD_DIR:uploads/community}
neoulteo.jwt.secret=${NEOULTEO_JWT_SECRET:neoulteo-local-development-jwt-secret-key}
neoulteo.jwt.validity-seconds=${NEOULTEO_JWT_VALIDITY_SECONDS:1209600}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

tour.api.base-url=https://apis.data.go.kr/B551011/KorService2/areaBasedList2
tour.api.service-key=${TOUR_API_SERVICE_KEY:}
tour.api.mobile-os=ETC
tour.api.mobile-app=Neoulteo
tour.api.num-of-rows=1000
tour.api.max-pages=0
tour.api.area-code=
tour.api.content-type-id=12
tour.api.content-type-ids=12,14,15,25,28,32,38,39

gms.openai.base-url=https://gms.ssafy.io/gmsapi/api.openai.com
gms.openai.chat-url=${gms.openai.base-url}/v1/chat/completions
gms.openai.api-key=${GMS_OPENAI_API_KEY:}
gms.openai.model=${GMS_OPENAI_MODEL:gpt-4o-mini}

tour.batch.pdf-output-dir=../storage/output

neoulteo.ai.spring-ai.enabled=${NEOULTEO_AI_ENABLED:false}
neoulteo.ai.rag.top-k=${NEOULTEO_RAG_TOP_K:5}
neoulteo.ai.rag.max-documents=${NEOULTEO_RAG_MAX_DOCUMENTS:0}
neoulteo.ai.rag.lexical-candidate-limit=${NEOULTEO_RAG_LEXICAL_CANDIDATE_LIMIT:80}
neoulteo.ai.weather.api-key=${WEATHER_API_KEY:}
neoulteo.ai.travel-search.api-key=${TRAVEL_SEARCH_API_KEY:}
neoulteo.routing.tmap-app-key=${TMAP_APP_KEY:}
spring.ai.openai.chat.enabled=${NEOULTEO_AI_ENABLED:false}
spring.ai.openai.base-url=${gms.openai.base-url}
spring.ai.openai.api-key=${GMS_OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${GMS_OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.embedding.enabled=${NEOULTEO_AI_ENABLED:false}
spring.ai.openai.embedding.base-url=${gms.openai.base-url}
spring.ai.openai.embedding.api-key=${GMS_OPENAI_API_KEY:}
spring.ai.openai.embedding.options.model=${GMS_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
